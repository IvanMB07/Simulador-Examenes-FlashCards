<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Playlist Sorter Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">MUSIC<span>SORTER</span></div>
            <div class="stats">
                <div class="stat-item day">☀️ Día: <span id="count-day">0</span></div>
                <div class="stat-item night">🌙 Noche: <span id="count-night">0</span></div>
            </div>
            <div class="export-zone">
                <p>Descargar resultados:</p>
                <button class="btn-export day" onclick="download('dia')">Exportar CSV DÍA</button>
                <button class="btn-export night" onclick="download('night')">Exportar CSV NOCHE</button>
            </div>
        </aside>

        <main class="main-content">
            <div id="upload-screen" class="card">
                <h1>Carga tu archivo original</h1>
                <p>Sube el archivo .csv para procesar las canciones</p>
                <div class="drop-zone" id="drop-zone">
                    <span>📁 Arrastra tu CSV aquí o haz clic</span>
                    <input type="file" id="file-input" hidden accept=".csv, .xlsx">
                </div>
            </div>

            <div id="sorter-screen" class="card" style="display:none">
                <div class="progress-container">
                    <div class="progress-bar" id="bar"></div>
                </div>
                <span id="progress-text">0/0</span>

                <div class="track-display">
                    <h2 id="track-title">Cargando...</h2>
                    <p id="track-artist">---</p>
                </div>

                <div class="controls">
                    <button class="choice-btn day" id="btn-day" onclick="toggle('day')">☀️ DÍA</button>
                    <button class="choice-btn night" id="btn-night" onclick="toggle('night')">🌙 NOCHE</button>
                </div>
                <button class="btn-next" onclick="confirmNext()">CONFIRMAR Y SIGUIENTE ➡️</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
